version: '3.8'

services:
  parser-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aphelion-parser-test
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    environment:
      - TERM=xterm-256color
    stdin_open: true
    tty: true
    command: /bin/bash
